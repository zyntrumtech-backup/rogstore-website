backend:
  name: git-gateway
  branch: main

media_folder: "public/images/products"
public_folder: "/images/products"

# Disable unstyled split preview pane for a full-screen, clean form UI
editor_preview: false

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/data/products"
    create: true
    delete: true
    slug: "{{fields.id}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Unique ID / URL Slug", name: "id", widget: "string", hint: "Simple lowercase identifier with dashes (e.g. rog-rtx-4090)" }
      - { label: "Brand", name: "brand", widget: "string", default: "ROG Store" }
      - { label: "Category", name: "category", widget: "select", options: [
          "Gaming PCs", "Custom PCs", "Graphics Cards", "Monitors", "Accessories", "Processors", "Motherboards", "RAM", "Power Supplies", "Cases", "CPU Coolers", "Gaming Headsets", "Mechanical Keyboards", "Gaming Mice"
        ]}
      - { label: "Availability", name: "availability", widget: "select", default: "in_stock", options: [
          { label: "In Stock", value: "in_stock" },
          { label: "Out of Stock", value: "out_of_stock" },
          { label: "Pre-Order", value: "pre_order" }
        ]}
      - { label: "Product Image", name: "image", widget: "image" }
      - { label: "Warranty", name: "warranty", widget: "string", default: "Official Brand Warranty", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
